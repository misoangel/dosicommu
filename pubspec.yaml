name: dosicommu
description: 부산광역시 사하구의회 도시위원회 업무 관리 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.9
  # UI
  cupertino_icons: ^1.0.6
  go_router: ^12.1.3
  # 파일
  file_picker: ^6.1.1
  flutter_pdfview: ^1.3.2
  # 날짜
  intl: ^0.18.1
  # 기타
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
